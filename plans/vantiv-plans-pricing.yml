specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Vantiv
providerId: vantiv
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Payments
  - Payment Processing
  - Acquiring
  - eCommerce
description: Vantiv is now operating under the Worldpay brand following the Vantiv-Worldpay merger and the 2024 GTCR/FIS deal. Pricing is published on the Worldpay UK pricing site as a per-transaction authorisation fee plus monthly service and equipment fees, with quotes finalized after a merchant questionnaire. The "indicative" rate card below is the published list price; bespoke pricing depends on volume, MCC, and channel.
sources:
  - https://go.worldpay.com/pricing
  - https://docs.worldpay.com/access/
plans:
  - id: vantiv-worldpay-indicative
    name: Worldpay Card Processing (Indicative Rate Card)
    type: usage-based
    description: Indicative published rate card for Visa/Mastercard authorization. Auth fee is flat per transaction; PCI DSS, terminal, and minimum service fees are monthly recurring. Per the pricing page, indicative quotes are personalised after entering turnover, average transaction value, and MCC.
    entries:
      - label: Authorisation Fee (per transaction)
        name: authorisation_fee
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: UK
        unit: 1
        price: '4.5p'
        userMultiplied: false
      - label: Additional Per-Transaction Charge (in-person)
        name: in_person_additional_charge
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: UK
        unit: 1
        price: '0.0%'
        userMultiplied: false
      - label: Additional Per-Transaction Charge (online/phone)
        name: online_phone_additional_charge
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: UK
        unit: 1
        price: '0.0%'
        userMultiplied: false
      - label: Point-of-Sale Terminal
        name: pos_terminal
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: UK
        unit: 1
        price: £20.00
        userMultiplied: false
      - label: PCI DSS Service Fee
        name: pci_dss_fee
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: UK
        unit: 1
        price: £5.00
        userMultiplied: false
      - label: Minimum Monthly Service Charge
        name: minimum_service_charge
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: UK
        unit: 1
        price: £15.00
        userMultiplied: false
      - label: Chargeback Fee
        name: chargeback_fee
        type: metered
        metric: chargeback
        limit: -1
        timeFrame: usage
        geo: UK
        unit: 1
        price: £20.00
        userMultiplied: false
    elements:
      - name: Visa, Mastercard, American Express Acceptance
      - name: 24-Hour Settlement
      - name: Gateway Included
      - name: Worldpay Access APIs (Card Payments, Payouts, Risk)
  - id: vantiv-worldpay-custom
    name: Custom / Volume Pricing
    type: enterprise
    description: Bespoke pricing replaces the indicative rate card once a merchant submits annual turnover, average transaction value, and merchant category code. Used for high-volume and specialty MCC merchants.
    entries:
      - label: Negotiated Per-Transaction & Monthly Pricing
        name: negotiated_pricing
        type: tiered
        metric: transaction
        limit: -1
        timeFrame: month
        geo: UK
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Volume-Based Discounts
      - name: MCC-Specific Pricing
      - name: Merchant Questionnaire Required
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
