specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Vantiv
providerId: vantiv
publisherName: Worldpay (Vantiv legacy brand)
serviceCategory: Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Payments
  - Payment Processing
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Vantiv (now Worldpay): per-transaction authorisation fee plus monthly recurring service/equipment fees and chargeback charges. Bespoke pricing replaces the indicative rate card based on volume, MCC, and channel.'
sources:
  - https://go.worldpay.com/pricing
  - https://docs.worldpay.com/access/
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Monthly
  billingCurrency: GBP
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Worldpay (Vantiv)
  ServiceCategory: Payments
  ProviderName: Worldpay
  PublisherName: Worldpay
  InvoiceIssuerName: Worldpay
  BillingCurrency: GBP
  ChargeCategory: Usage
meters:
  - name: card_authorisations
    description: Card authorisation requests, billed at the flat per-transaction auth fee
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - channel
      - mcc
  - name: pos_terminal_months
    description: Active POS terminal months billed at the monthly terminal fee
    unit: terminal-month
    aggregation: sum
  - name: pci_dss_months
    description: PCI DSS service months billed at the monthly PCI fee
    unit: month
    aggregation: sum
  - name: minimum_service
    description: Minimum monthly service charge applied when usage fees fall below the floor
    unit: month
    aggregation: sum
  - name: chargebacks
    description: Chargebacks billed at the per-event fee
    unit: chargeback
    aggregation: sum
    dimensions:
      - reason_code
principles:
  - name: Visibility
    description: Reconcile monthly Worldpay statements against transaction logs by channel (in-person vs online/phone) and card brand; capture WP-CorrelationId for any disputed line.
  - name: Allocation
    description: Allocate by MID/store and by channel using Worldpay reporting; tag transactions with internal location/department identifiers in the merchant reference.
  - name: Optimization
    description: Lower effective cost by submitting an updated turnover/AVT questionnaire to renegotiate the bespoke rate card; reduce chargebacks via 3DS, address checks, and risk rules.
  - name: Accountability
    description: Owner is the merchant's payments/finance team; review monthly minimum-service and PCI DSS charges and reconcile chargeback fees against dispute resolution outcomes.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
