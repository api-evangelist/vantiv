    description: The Vantiv Card Not Present (CNP) API, formerly known as the Litle eCommerce API, enables online and mobile
      payment processing. Supports authorizations, sales, captures, credits, voids, tokenization, chargebacks, and recurring
      billing through XML-based HTTPS POST requests.
