description: Vantiv was a leading American payment processing and technology provider that merged with Worldpay in 2018, forming
  Worldpay from FIS. Vantiv provided integrated payment processing solutions for merchants, financial institutions, and businesses
  across eCommerce, in-store, and omni-channel payment scenarios. Their cnpAPI (formerly litleAPI) supported credit card authorizations,
  captures, sales, refunds, voids, tokenization, chargebacks, and recurring billing.
