specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Vantiv
providerId: vantiv
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - Payment Processing
  - Rate Limiting
description: Vantiv operates under the Worldpay brand. The Access Worldpay developer documentation does not publish a global per-second rate-limit policy; specifics live in individual product references. Worldpay does document correlation IDs (WP-CorrelationId) and a date-based versioning header (WP-Api-Version), and operates a public service status site for incident telemetry.
sources:
  - https://docs.worldpay.com/access/
  - https://docs.worldpay.com/access/products/reference/api-principles
  - https://status.access.worldpay.com/
notes: No central rate-limit page; per-API limits and idempotency rules are documented at the individual product/endpoint level. Consumers should reference the OpenAPI for the specific Access product they integrate.
headers:
  correlationId: WP-CorrelationId
  apiVersion: WP-Api-Version
responseCodes:
  throttled: 429
limits:
  - name: Per-Product Limits (Access Worldpay)
    scope: account
    metric: varies
    limit: see individual Access product reference
policies:
  - name: API Versioning
    description: Clients must send WP-Api-Version using a date string (e.g. 2024-06-01) to pin the contract; absence may default to a Worldpay-chosen version.
  - name: Correlation Identifiers
    description: Worldpay returns WP-CorrelationId on responses; capture it for support requests.
  - name: Status & Incident Tracking
    description: Live throttling and degradation events are published at status.access.worldpay.com; subscribe for incident-driven retry guidance.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
