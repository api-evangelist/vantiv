naftiko: 1.0.0-alpha2
info:
  label: Vantiv CNP API — Voids
  description: 'Vantiv CNP API — Voids. 1 operations. Lead operation: Create Void. Self-contained Naftiko capability covering
    one Vantiv business surface.'
  tags:
  - Vantiv
  - Voids
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTIV_API_KEY: VANTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cnp-voids
    baseUri: https://payments.vantivprelive.com/vap/communicator/online
    description: Vantiv CNP API — Voids business capability. Self-contained, no shared references.
    resources:
    - name: void
      path: /void
      operations:
      - name: createvoid
        method: POST
        description: Create Void
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.VANTIV_USER}}'
      password: '{{env.VANTIV_PASS}}'
  exposes:
  - type: rest
    namespace: cnp-voids-rest
    port: 8080
    description: REST adapter for Vantiv CNP API — Voids. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/void
      name: void
      description: REST surface for void.
      operations:
      - method: POST
        name: createvoid
        description: Create Void
        call: cnp-voids.createvoid
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cnp-voids-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vantiv CNP API — Voids. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-void
      description: Create Void
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cnp-voids.createvoid
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
