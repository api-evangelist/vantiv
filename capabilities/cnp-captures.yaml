naftiko: 1.0.0-alpha2
info:
  label: Vantiv CNP API — Captures
  description: 'Vantiv CNP API — Captures. 1 operations. Lead operation: Create Capture. Self-contained Naftiko capability
    covering one Vantiv business surface.'
  tags:
  - Vantiv
  - Captures
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTIV_API_KEY: VANTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cnp-captures
    baseUri: https://payments.vantivprelive.com/vap/communicator/online
    description: Vantiv CNP API — Captures business capability. Self-contained, no shared references.
    resources:
    - name: capture
      path: /capture
      operations:
      - name: createcapture
        method: POST
        description: Create Capture
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.VANTIV_USER}}'
      password: '{{env.VANTIV_PASS}}'
  exposes:
  - type: rest
    namespace: cnp-captures-rest
    port: 8080
    description: REST adapter for Vantiv CNP API — Captures. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/capture
      name: capture
      description: REST surface for capture.
      operations:
      - method: POST
        name: createcapture
        description: Create Capture
        call: cnp-captures.createcapture
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cnp-captures-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vantiv CNP API — Captures. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-capture
      description: Create Capture
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cnp-captures.createcapture
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
