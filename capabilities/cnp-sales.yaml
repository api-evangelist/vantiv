naftiko: 1.0.0-alpha2
info:
  label: Vantiv CNP API — Sales
  description: 'Vantiv CNP API — Sales. 1 operations. Lead operation: Create Sale. Self-contained Naftiko capability covering
    one Vantiv business surface.'
  tags:
  - Vantiv
  - Sales
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTIV_API_KEY: VANTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cnp-sales
    baseUri: https://payments.vantivprelive.com/vap/communicator/online
    description: Vantiv CNP API — Sales business capability. Self-contained, no shared references.
    resources:
    - name: sale
      path: /sale
      operations:
      - name: createsale
        method: POST
        description: Create Sale
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.VANTIV_USER}}'
      password: '{{env.VANTIV_PASS}}'
  exposes:
  - type: rest
    namespace: cnp-sales-rest
    port: 8080
    description: REST adapter for Vantiv CNP API — Sales. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sale
      name: sale
      description: REST surface for sale.
      operations:
      - method: POST
        name: createsale
        description: Create Sale
        call: cnp-sales.createsale
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cnp-sales-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vantiv CNP API — Sales. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-sale
      description: Create Sale
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cnp-sales.createsale
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
