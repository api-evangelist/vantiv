naftiko: 1.0.0-alpha2
info:
  label: Vantiv CNP API — Recurring
  description: 'Vantiv CNP API — Recurring. 1 operations. Lead operation: Create Recurring Transaction. Self-contained Naftiko
    capability covering one Vantiv business surface.'
  tags:
  - Vantiv
  - Recurring
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTIV_API_KEY: VANTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cnp-recurring
    baseUri: https://payments.vantivprelive.com/vap/communicator/online
    description: Vantiv CNP API — Recurring business capability. Self-contained, no shared references.
    resources:
    - name: recurringTransaction
      path: /recurringTransaction
      operations:
      - name: createrecurringtransaction
        method: POST
        description: Create Recurring Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.VANTIV_USER}}'
      password: '{{env.VANTIV_PASS}}'
  exposes:
  - type: rest
    namespace: cnp-recurring-rest
    port: 8080
    description: REST adapter for Vantiv CNP API — Recurring. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/recurringtransaction
      name: recurringtransaction
      description: REST surface for recurringTransaction.
      operations:
      - method: POST
        name: createrecurringtransaction
        description: Create Recurring Transaction
        call: cnp-recurring.createrecurringtransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cnp-recurring-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vantiv CNP API — Recurring. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-recurring-transaction
      description: Create Recurring Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cnp-recurring.createrecurringtransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
