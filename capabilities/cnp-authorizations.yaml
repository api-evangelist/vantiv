naftiko: 1.0.0-alpha2
info:
  label: Vantiv CNP API — Authorizations
  description: 'Vantiv CNP API — Authorizations. 1 operations. Lead operation: Create Authorization. Self-contained Naftiko
    capability covering one Vantiv business surface.'
  tags:
  - Vantiv
  - Authorizations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VANTIV_API_KEY: VANTIV_API_KEY
capability:
  consumes:
  - type: http
    namespace: cnp-authorizations
    baseUri: https://payments.vantivprelive.com/vap/communicator/online
    description: Vantiv CNP API — Authorizations business capability. Self-contained, no shared references.
    resources:
    - name: authorization
      path: /authorization
      operations:
      - name: createauthorization
        method: POST
        description: Create Authorization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.VANTIV_USER}}'
      password: '{{env.VANTIV_PASS}}'
  exposes:
  - type: rest
    namespace: cnp-authorizations-rest
    port: 8080
    description: REST adapter for Vantiv CNP API — Authorizations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authorization
      name: authorization
      description: REST surface for authorization.
      operations:
      - method: POST
        name: createauthorization
        description: Create Authorization
        call: cnp-authorizations.createauthorization
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cnp-authorizations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vantiv CNP API — Authorizations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-authorization
      description: Create Authorization
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cnp-authorizations.createauthorization
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
